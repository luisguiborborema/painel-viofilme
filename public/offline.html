<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sem conexão — Painel Viofilme</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        background: #0b1220;
        color: #e5e9f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #2a63c9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 22px;
        color: #fff;
      }
      h1 { font-size: 18px; margin: 8px 0 0; }
      p { color: #9aa4b8; font-size: 14px; max-width: 340px; margin: 0; }
      button {
        margin-top: 8px;
        border: 0;
        border-radius: 12px;
        background: #2a63c9;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        padding: 10px 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="logo">V</div>
    <h1>Você está sem conexão</h1>
    <p>
      Não foi possível carregar o painel agora. Verifique sua internet e tente
      novamente.
    </p>
    <button onclick="location.reload()">Tentar de novo</button>
  </body>
</html>
